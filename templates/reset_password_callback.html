{% extends "base.html" %}

{% block title %}Verifying... - The Manhattan Project{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full relative z-10 text-center">
        <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl shadow-cyan-500/10">
            <i data-lucide="loader-2" class="w-12 h-12 mx-auto animate-spin mb-4 text-cyan-500"></i>
            <h1 class="text-2xl font-bold text-white tracking-tight mb-2">Verifying Reset Link</h1>
            <p class="text-gray-400">Please wait while we verify your request...</p>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const access_token = fragment.get("access_token");
        const refresh_token = fragment.get("refresh_token");

        if (access_token) {
            fetch("/auth/callback", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ access_token, refresh_token })
            }).then(() => {
                window.location.href = "/reset_password";
            });
        } else {
            window.location.href = "/auth";
        }
    });
</script>
{% endblock %}
