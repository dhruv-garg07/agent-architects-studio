{% extends 'base.html' %}

{% block title %}API Documentation{% endblock %}

{% block content %}
<div class="mcp-wrap">

  <!-- ══════  LEFT SIDEBAR  ══════ -->
  <aside class="mcp-sidebar" id="mcp-sidebar">
    <div class="mcp-sidebar-scroll" id="sidebar-nav">
      <!-- Populated by JS -->
    </div>
  </aside>

  <!-- Mobile Overlay -->
  <div class="mcp-overlay" id="mcp-overlay"></div>

  <!-- ══════  MAIN CONTENT  ══════ -->
  <main class="mcp-main" id="mcp-main">

    <!-- Hero -->
    <div class="mcp-hero">
      <div class="mcp-hero-badge">Documentation</div>
      <h1>API Documentation</h1>
      <p>Interactive documentation with code examples and detailed usage info.</p>
    </div>

    <section id="api-content">
      <!-- Documentation content will be injected here by JS -->
      <div class="text-gray-400 text-sm">Loading endpoints...</div>
    </section>

  </main>

  <!-- ══════  RIGHT TOC  ══════ -->
  <aside class="mcp-toc" id="mcp-toc">
    <div class="mcp-toc-label">On this page</div>
    <nav id="toc-nav"></nav>
  </aside>
</div>

<!-- Mobile FAB -->
<button class="mcp-fab" id="mcp-fab" aria-label="Menu">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
    stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="12" x2="21" y2="12" />
    <line x1="3" y1="6" x2="21" y2="6" />
    <line x1="3" y1="18" x2="21" y2="18" />
  </svg>
</button>

<!-- ════════════════════  STYLES  ════════════════════ -->
<style>
  /* ── Tokens (inheriting from site's dark theme) ── */
  :root {
    --mcp-bg: #1a1a1a;
    --mcp-sidebar-bg: #151515;
    --mcp-surface: #222222;
    --mcp-surface-2: #2a2a2a;
    --mcp-border: #2d2d2d;
    --mcp-border-hi: #3a3a3a;
    --mcp-text: #c8c8d0;
    --mcp-heading: #eaeaef;
    --mcp-muted: #78788a;
    --mcp-primary: #6366f1;
    --mcp-primary-soft: rgba(99, 102, 241, .12);
    --mcp-cyan: #06b6d4;
    --mcp-green: #22c55e;
    --mcp-header-h: 56px;
    --mcp-sidebar-w: 240px;
    --mcp-toc-w: 200px;
    --mcp-font: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    --mcp-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --mcp-radius: 10px;
  }

  /* ── Layout ── */
  .mcp-wrap {
    display: grid;
    grid-template-columns: var(--mcp-sidebar-w) minmax(0, 1fr) var(--mcp-toc-w);
    max-width: 1380px;
    margin: 0 auto;
    min-height: calc(100vh - var(--mcp-header-h));
    font-family: var(--mcp-font);
  }

  /* ── LEFT SIDEBAR ── */
  .mcp-sidebar {
    position: sticky;
    top: var(--mcp-header-h);
    height: calc(100vh - var(--mcp-header-h));
    overflow-y: auto;
    background: var(--mcp-sidebar-bg);
    border-right: 1px solid var(--mcp-border);
    padding: 20px 0 60px;
  }

  .mcp-sidebar::-webkit-scrollbar {
    width: 0;
  }

  .mcp-nav-group {
    margin-bottom: 24px;
  }

  .mcp-nav-heading {
    padding: 0 18px;
    margin-bottom: 6px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--mcp-muted);
  }

  .mcp-nav-link {
    display: block;
    padding: 7px 18px 7px 20px;
    font-size: 13.5px;
    line-height: 1.4;
    color: var(--mcp-muted);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color .15s, background .15s, border-color .15s;
  }

  .mcp-nav-link:hover {
    color: var(--mcp-text);
    background: rgba(255, 255, 255, .03);
  }

  .mcp-nav-link.active {
    color: #fff;
    background: var(--mcp-primary-soft);
    border-left-color: var(--mcp-primary);
  }

  /* ── MAIN CONTENT ── */
  .mcp-main {
    padding: 36px 48px 80px;
    max-width: 780px;
    color: var(--mcp-text);
    line-height: 1.7;
    font-size: 15px;
  }

  /* Hero */
  .mcp-hero {
    margin-bottom: 32px;
  }

  .mcp-hero-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 6px;
    margin-bottom: 14px;
    background: var(--mcp-primary-soft);
    color: var(--mcp-primary);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .mcp-hero h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin: 0 0 8px;
    line-height: 1.2;
  }

  .mcp-hero p {
    font-size: 16px;
    color: var(--mcp-muted);
    margin: 0;
  }

  /* Headings */
  .mcp-main h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--mcp-heading);
    margin: 48px 0 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--mcp-border);
    scroll-margin-top: calc(var(--mcp-header-h) + 20px);
  }

  .mcp-main h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--mcp-heading);
    margin: 28px 0 8px;
    scroll-margin-top: calc(var(--mcp-header-h) + 20px);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Method Badges */
  .method-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    vertical-align: middle;
  }

  .method-get {
    background: rgba(16, 185, 129, 0.15);
    color: #10b981;
    border: 1px solid rgba(16, 185, 129, 0.25);
  }

  .method-post {
    background: rgba(59, 130, 246, 0.15);
    color: #3b82f6;
    border: 1px solid rgba(59, 130, 246, 0.25);
  }

  .method-put {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
    border: 1px solid rgba(245, 158, 11, 0.25);
  }

  .method-delete {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.25);
  }

  .method-patch {
    background: rgba(139, 92, 246, 0.15);
    color: #8b5cf6;
    border: 1px solid rgba(139, 92, 246, 0.25);
  }


  .mcp-main p {
    margin: 0 0 14px;
  }

  .mcp-main a {
    color: var(--mcp-primary);
    text-decoration: none;
  }

  .mcp-main a:hover {
    text-decoration: underline;
  }

  .mcp-main code {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: .87em;
    background: var(--mcp-primary-soft);
    color: #a5b4fc;
    font-family: var(--mcp-mono);
  }

  /* ── Code Blocks ── */
  .mcp-code {
    border-radius: var(--mcp-radius);
    overflow: hidden;
    border: 1px solid var(--mcp-border);
    margin-bottom: 20px;
    background: #111111;
  }

  .mcp-code-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0, 0, 0, .4);
    border-bottom: 1px solid var(--mcp-border);
    font-size: 12px;
    color: var(--mcp-muted);
  }

  .mcp-code-dots {
    display: flex;
    gap: 5px;
  }

  .mcp-code-dots i {
    display: block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .mcp-code-dots i:nth-child(1) {
    background: #ff5f57;
  }

  .mcp-code-dots i:nth-child(2) {
    background: #febc2e;
  }

  .mcp-code-dots i:nth-child(3) {
    background: #28c840;
  }

  .mcp-code-bar span {
    flex: 1;
  }

  .mcp-copy {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 5px;
    background: rgba(255, 255, 255, .06);
    color: var(--mcp-muted);
    border: 1px solid var(--mcp-border);
    cursor: pointer;
    transition: background .15s, color .15s;
    font-family: var(--mcp-font);
  }

  .mcp-copy:hover {
    background: rgba(255, 255, 255, .1);
    color: #fff;
  }

  .mcp-code pre {
    margin: 0;
    padding: 16px 18px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
    color: #d4d4d8;
    font-family: var(--mcp-mono);
  }

  .mcp-code pre::-webkit-scrollbar {
    height: 4px;
  }

  .mcp-code pre::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, .08);
    border-radius: 4px;
  }

  /* ── Tables ── */
  .mcp-tbl-wrap {
    overflow-x: auto;
    border-radius: var(--mcp-radius);
    border: 1px solid var(--mcp-border);
    margin-bottom: 20px;
  }

  .mcp-tbl {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  .mcp-tbl thead {
    background: var(--mcp-surface);
  }

  .mcp-tbl th {
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--mcp-muted);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: .05em;
    border-bottom: 1px solid var(--mcp-border);
  }

  .mcp-tbl td {
    padding: 10px 16px;
    border-top: 1px solid var(--mcp-border);
    color: var(--mcp-text);
  }

  .mcp-tbl td code {
    background: var(--mcp-primary-soft);
    color: #a5b4fc;
  }

  .mcp-tbl tbody tr {
    transition: background .12s;
  }

  .mcp-tbl tbody tr:hover {
    background: rgba(255, 255, 255, .02);
  }

  /* ── RIGHT TOC ── */
  .mcp-toc {
    position: sticky;
    top: var(--mcp-header-h);
    height: calc(100vh - var(--mcp-header-h));
    overflow-y: auto;
    padding: 24px 14px 40px;
    border-left: 1px solid var(--mcp-border);
  }

  .mcp-toc::-webkit-scrollbar {
    width: 0;
  }

  .mcp-toc-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--mcp-muted);
    margin-bottom: 12px;
    padding-left: 10px;
  }

  .mcp-toc a {
    display: block;
    padding: 3px 0 3px 10px;
    font-size: 12.5px;
    color: var(--mcp-muted);
    text-decoration: none;
    border-left: 2px solid transparent;
    transition: color .12s, border-color .12s;
  }

  .mcp-toc a:hover {
    color: var(--mcp-text);
  }

  .mcp-toc a.active {
    color: #fff;
    border-left-color: var(--mcp-primary);
  }

  .mcp-toc a.toc-h3 {
    padding-left: 22px;
    font-size: 12px;
  }

  /* ── Mobile Overlay ── */
  .mcp-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .55);
    z-index: 90;
  }

  .mcp-fab {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 80;
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: var(--mcp-primary);
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99, 102, 241, .35);
    place-items: center;
    transition: transform .15s;
  }

  .mcp-fab:hover {
    transform: scale(1.05);
  }

  /* ════ Responsive ════ */
  @media (max-width: 1100px) {
    .mcp-toc {
      display: none;
    }

    .mcp-wrap {
      grid-template-columns: var(--mcp-sidebar-w) 1fr;
    }
  }

  @media (max-width: 768px) {
    .mcp-fab {
      display: grid;
    }

    .mcp-wrap {
      grid-template-columns: 1fr;
    }

    .mcp-sidebar {
      position: fixed;
      top: var(--mcp-header-h);
      left: 0;
      bottom: 0;
      width: 260px;
      z-index: 95;
      transform: translateX(-100%);
      transition: transform .25s cubic-bezier(.4, 0, .2, 1);
      box-shadow: 4px 0 24px rgba(0, 0, 0, .4);
    }

    .mcp-sidebar.open {
      transform: translateX(0);
    }

    .mcp-overlay.open {
      display: block;
    }

    .mcp-main {
      padding: 24px 18px 60px;
    }

    /* Hero font adjust */
    .mcp-hero h1 {
      font-size: 22px;
    }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

{% if docs_json %}
<script id="initial-docs" type="application/json">
{{ docs_json|safe }}
</script>
{% endif %}

<script>
  // Refactored API Documentation JS to work with MCP layout
  (async function () {
    // Read server-injected initial docs
    const INITIAL_DOCS_NODE = document.getElementById('initial-docs');
    let INITIAL_DOCS = null;
    if (INITIAL_DOCS_NODE) {
      try {
        INITIAL_DOCS = JSON.parse(INITIAL_DOCS_NODE.textContent || INITIAL_DOCS_NODE.innerText || 'null');
      } catch (e) {
        console.warn('Failed to parse initial docs JSON from DOM:', e);
      }
    }

    document.addEventListener('DOMContentLoaded', async function () {
      console.log('DOM loaded, initializing API docs...');

      let state = {
        docs: null
      };

      // Initialize
      async function init() {
        if (INITIAL_DOCS) {
          try {
            console.log('Using server-injected documentation data');
            state.docs = processDocsData(INITIAL_DOCS);
            renderDocs();
          } catch (e) {
            console.warn('Error processing INITIAL_DOCS, falling back to loadDocs()', e);
            await loadDocs();
          }
        } else {
          await loadDocs();
        }
      }

      async function loadDocs() {
        try {
          const url = '/static/index.json';
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Fetch failed for ${url}: ${response.status} ${response.statusText}`);
          }
          const data = await response.json();
          state.docs = processDocsData(data);
          renderDocs();
        } catch (error) {
          console.error('Critical error loading documentation:', error);
          state.docs = getFallbackData();
          renderDocs();
        }
      }

      function processDocsData(data) {
        if (!data || !data.categories) {
          return getFallbackData();
        }
        data.categories.forEach(category => {
          if (!category.endpoints) category.endpoints = [];
          category.endpoints.forEach(endpoint => {
            if (!endpoint.code) endpoint.code = {};
            if (!endpoint.code.curl && endpoint.path) endpoint.code.curl = generateCurlCommand(endpoint);
            if (!endpoint.code.python && endpoint.path) endpoint.code.python = generatePythonCode(endpoint);
            if (!endpoint.code.javascript && endpoint.path) endpoint.code.javascript = generateJavascriptCode(endpoint);

            Object.keys(endpoint.code).forEach(lang => {
              if (typeof endpoint.code[lang] === 'string') {
                endpoint.code[lang] = endpoint.code[lang].replace(/__BASE__|\{\{BASE\}\}/g, window.location.origin);
              }
            });

            if (!endpoint.parameters) endpoint.parameters = generateMockParameters(endpoint);

            // Assign a unique ID for scrolling
            endpoint.htmlId = `endpoint-${endpoint.method}-${endpoint.path.replace(/\//g, '-').replace(/[{}]/g, '')}`.toLowerCase();
          });
          category.htmlId = `category-${category.name.replace(/\s+/g, '-').toLowerCase()}`;
        });
        return data;
      }

      // Keep the old generation functions
      function generateCurlCommand(endpoint) {
        const baseUrl = window.location.origin;
        let curl = `curl -X ${endpoint.method} '${baseUrl}${endpoint.path}'`;
        curl += ` \\\n  -H 'Authorization: Bearer <API_KEY>'`;
        if (['POST', 'PUT', 'PATCH'].includes(endpoint.method)) {
          curl += ` \\\n  -H 'Content-Type: application/json'`;
        }
        if (endpoint.request && endpoint.method !== 'GET') {
          const jsonBody = JSON.stringify(endpoint.request, null, 2);
          curl += ` \\\n  -d '${jsonBody.replace(/\\n/g, '\\n').replace(/'/g, "\\'")}'`;
        }
        return curl;
      }

      function generatePythonCode(endpoint) {
        const baseUrl = window.location.origin;
        let pythonCode = `import requests\n\nheaders = {\n    'Authorization': 'Bearer <API_KEY>',\n`;
        if (['POST', 'PUT', 'PATCH'].includes(endpoint.method)) {
          pythonCode += `    'Content-Type': 'application/json'\n`;
        }
        pythonCode += `}\n\n`;
        const method = endpoint.method.toLowerCase();
        const url = `${baseUrl}${endpoint.path}`;
        if (endpoint.request && endpoint.method !== 'GET') {
          const jsonBody = JSON.stringify(endpoint.request, null, 2);
          pythonCode += `data = ${jsonBody}\n\n`;
          pythonCode += `response = requests.${method}('${url}', headers=headers, json=data)\n`;
        } else {
          pythonCode += `response = requests.${method}('${url}', headers=headers)\n`;
        }
        pythonCode += `print(response.json())`;
        return pythonCode;
      }

      function generateJavascriptCode(endpoint) {
        const baseUrl = window.location.origin;
        let jsCode = `fetch('${baseUrl}${endpoint.path}', {\n    method: '${endpoint.method}',\n    headers: {\n        'Authorization': 'Bearer <API_KEY>',\n`;
        if (['POST', 'PUT', 'PATCH'].includes(endpoint.method)) {
          jsCode += `        'Content-Type': 'application/json'\n`;
        } else {
          jsCode += `        'Content-Type': 'application/json'\n`;
        }
        jsCode += `    }`;
        if (endpoint.request && endpoint.method !== 'GET') {
          const jsonBody = JSON.stringify(endpoint.request, null, 2);
          jsCode += `,\n    body: JSON.stringify(${jsonBody})`;
        }
        jsCode += `\n})\n.then(response => response.json())\n.then(data => console.log(data))\n.catch(error => console.error('Error:', error));`;
        return jsCode;
      }

      function generateMockParameters(endpoint) {
        const params = [];
        const pathParams = endpoint.path.match(/{[^}]+}/g);
        if (pathParams) {
          pathParams.forEach(param => {
            const paramName = param.replace(/[{}]/g, '');
            params.push({ name: paramName, type: 'string', required: true, description: `Unique identifier for the ${paramName}`, location: 'path' });
          });
        }
        if (endpoint.method === 'GET') {
          params.push({ name: 'limit', type: 'integer', required: false, description: 'Number of items to return (default: 20, max: 100)', location: 'query' });
          params.push({ name: 'offset', type: 'integer', required: false, description: 'Number of items to skip (default: 0)', location: 'query' });
        }
        return params;
      }

      function getFallbackData() {
        return {
          categories: [
            {
              name: "Agents",
              endpoints: [
                {
                  path: "/agents",
                  method: "GET",
                  summary: "List agents",
                  description: "Retrieve a paginated list of agents. Supports filters: search, category, model, status.",
                  request: null,
                  response: { "agents": [], "pagination": { "total": 0, "page": 1, "limit": 20, "pages": 0 } }
                }
              ]
            }
          ]
        };
      }

      function escapeHTML(str) {
        return String(str).replace(/[&<>'"]/g, tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag]));
      }

      function renderDocs() {
        if (!state.docs || !state.docs.categories) return;

        const contentEl = document.getElementById('api-content');
        const sidebarNav = document.getElementById('sidebar-nav');
        const tocNav = document.getElementById('toc-nav');

        contentEl.innerHTML = '';
        sidebarNav.innerHTML = '';
        tocNav.innerHTML = '';

        state.docs.categories.forEach(category => {
          // Ignore empty categories
          if (!category.endpoints.length) return;

          // Sidebar Group
          const sidebarGroup = document.createElement('div');
          sidebarGroup.className = 'mcp-nav-group';
          sidebarGroup.innerHTML = `<div class="mcp-nav-heading">${escapeHTML(category.name)}</div>`;

          // TOC Link for Category
          const tocCat = document.createElement('a');
          tocCat.href = `#${category.htmlId}`;
          tocCat.textContent = category.name;
          tocNav.appendChild(tocCat);

          // Main Content Section
          const section = document.createElement('section');
          section.className = 'mcp-section';
          section.id = category.htmlId;

          const catHeader = document.createElement('h2');
          catHeader.textContent = category.name;
          section.appendChild(catHeader);

          category.endpoints.forEach(endpoint => {
            // Sidebar Link
            const navLink = document.createElement('a');
            navLink.className = 'mcp-nav-link';
            navLink.href = `#${endpoint.htmlId}`;
            navLink.innerHTML = `<span style="opacity:0.6;font-size:10px;margin-right:4px;" class="method-badge method-${endpoint.method.toLowerCase()}">${endpoint.method}</span> ${escapeHTML(endpoint.summary || endpoint.path)}`;
            sidebarGroup.appendChild(navLink);

            // TOC Link for Endpoint
            const tocEnd = document.createElement('a');
            tocEnd.href = `#${endpoint.htmlId}`;
            tocEnd.className = 'toc-h3';
            tocEnd.innerHTML = `<span style="opacity:0.6;font-size:8px;margin-right:2px;">${endpoint.method}</span> ${escapeHTML(endpoint.path)}`;
            tocNav.appendChild(tocEnd);

            // Endpoint Header
            const endHeader = document.createElement('h3');
            endHeader.id = endpoint.htmlId;
            endHeader.innerHTML = `
                        <span class="method-badge method-${endpoint.method.toLowerCase()}">${endpoint.method}</span>
                        ${escapeHTML(endpoint.path)}
                    `;
            section.appendChild(endHeader);

            const endDesc = document.createElement('p');
            endDesc.innerHTML = `<strong>${escapeHTML(endpoint.summary || '')}</strong> &mdash; ${escapeHTML(endpoint.description || '')}`;
            section.appendChild(endDesc);

            // Parameters
            if (endpoint.parameters && endpoint.parameters.length > 0) {
              const tblWrap = document.createElement('div');
              tblWrap.className = 'mcp-tbl-wrap';
              let tblHTML = `<table class="mcp-tbl">
                            <thead>
                                <tr>
                                    <th>Parameter</th>
                                    <th>Type</th>
                                    <th>Required</th>
                                    <th>Description</th>
                                </tr>
                            </thead>
                            <tbody>`;
              endpoint.parameters.forEach(p => {
                tblHTML += `<tr>
                                <td><code>${escapeHTML(p.name)}</code></td>
                                <td>${escapeHTML(p.type)}</td>
                                <td>${p.required ? 'Yes' : 'No'}</td>
                                <td>${escapeHTML(p.description)}</td>
                            </tr>`;
              });
              tblHTML += `</tbody></table>`;
              tblWrap.innerHTML = tblHTML;
              section.appendChild(tblWrap);
            }

            // Request / Response / Code
            const codeWrap = document.createElement('div');

            // Code examples (cURL)
            if (endpoint.code && endpoint.code.curl) {
              codeWrap.appendChild(createCodeBlock('cURL', 'bash', endpoint.code.curl));
            }

            // JSON Request
            if (endpoint.request && Object.keys(endpoint.request).length > 0) {
              codeWrap.appendChild(createCodeBlock('Request Details', 'json', JSON.stringify(endpoint.request, null, 2)));
            }

            // JSON Response
            if (endpoint.response) {
              codeWrap.appendChild(createCodeBlock('Response Example', 'json', JSON.stringify(endpoint.response, null, 2)));
            }

            section.appendChild(codeWrap);
          });

          sidebarNav.appendChild(sidebarGroup);
          contentEl.appendChild(section);
        });

        // Initialize copying
        initCopyButtons();

        // Highlight code blocks
        if (typeof Prism !== 'undefined') {
          Prism.highlightAllUnder(contentEl);
        }

        // Init Scroll Spy
        initScrollSpy();
      }

      function createCodeBlock(label, language, codeContent) {
        const div = document.createElement('div');
        div.className = 'mcp-code';
        div.innerHTML = `
                <div class="mcp-code-bar">
                    <div class="mcp-code-dots"><i></i><i></i><i></i></div>
                    <span>${escapeHTML(label)}</span>
                    <button class="mcp-copy" data-copy>Copy</button>
                </div>
                <pre><code class="language-${language}">${escapeHTML(codeContent)}</code></pre>
            `;
        return div;
      }

      function initCopyButtons() {
        document.querySelectorAll('.mcp-copy').forEach(btn => {
          btn.addEventListener('click', () => {
            const codeBlock = btn.closest('.mcp-code').querySelector('code');
            if (codeBlock) {
              navigator.clipboard.writeText(codeBlock.textContent);
              btn.textContent = 'Copied!';
              setTimeout(() => btn.textContent = 'Copy', 1800);
            }
          });
        });
      }

      function initScrollSpy() {
        const sections = document.querySelectorAll('.mcp-section');
        const navLinks = document.querySelectorAll('.mcp-nav-link');
        const tocLinks = document.querySelectorAll('#toc-nav a');
        const headings = document.querySelectorAll('.mcp-main h2[id], .mcp-main h3[id]');

        function spy() {
          let cur = '';
          // Since sections are categories, and h3s are endpoints, 
          // we want to highlight active link for the specific endpoint
          let curH = '';
          headings.forEach(h => { if (h.getBoundingClientRect().top < 150) curH = h.id; });

          navLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === `#${curH}`));
          tocLinks.forEach(l => l.classList.toggle('active', l.getAttribute('href') === `#${curH}`));
        }
        window.addEventListener('scroll', spy, { passive: true });
        spy();

        // Setup smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(a => {
          a.addEventListener('click', e => {
            const selector = a.getAttribute('href');
            if (selector.length > 1) {
              try {
                const t = document.querySelector(selector);
                if (t) {
                  e.preventDefault();
                  t.scrollIntoView({ behavior: 'smooth', block: 'start' });
                  history.replaceState(null, '', selector);
                }
              } catch (err) { }
            }
          });
        });
      }

      // Mobile functionality
      const fab = document.getElementById('mcp-fab');
      const sidebar = document.getElementById('mcp-sidebar');
      const overlay = document.getElementById('mcp-overlay');
      const sidebarNav = document.getElementById('sidebar-nav');

      function toggle(open) {
        sidebar.classList.toggle('open', open);
        overlay.classList.toggle('open', open);
      }

      if (fab && sidebar && overlay) {
        fab.addEventListener('click', () => toggle(!sidebar.classList.contains('open')));
        overlay.addEventListener('click', () => toggle(false));
        sidebarNav.addEventListener('click', e => {
          if (e.target.closest('.mcp-nav-link')) toggle(false);
        });
      }

      await init();
    });
  })();
</script>
{% endblock %}
