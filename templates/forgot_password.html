{% extends "base.html" %}

{% block title %}Forgot Password - AI Agent Marketplace{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <!-- Decorative blurs -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-violet-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-cyan-500/15 rounded-full blur-3xl"></div>
    </div>
    <div class="max-w-md w-full relative z-10">
        <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl shadow-violet-500/10">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Reset Password</h1>
                <p class="text-gray-400">Enter your email and we'll send you a recovery link</p>
            </div>

            <!-- Forgot Password Form -->
            <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-foreground mb-2">
                        Email Address
                    </label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email"
                        class="input w-full">
                </div>

                <button type="submit" class="btn-primary w-full">
                    <i data-lucide="mail" class="w-4 h-4 mr-2"></i>
                    Send Recovery Link
                </button>
            </form>

            <div class="mt-6 text-center text-sm">
                <a href="{{ url_for('auth') }}" class="text-gray-400 hover:text-white transition-colors">
                    Back to Sign In
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
