{% extends "base.html" %}

{% block title %}Type New Password - AI Agent Marketplace{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-violet-500/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/3 w-80 h-80 bg-cyan-500/15 rounded-full blur-3xl"></div>
    </div>
    <div class="max-w-md w-full relative z-10">
        <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-2xl p-8 shadow-2xl shadow-violet-500/10">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Create New Password</h1>
                <p class="text-gray-400">Please enter your new password.</p>
            </div>

            <form method="POST" action="{{ url_for('reset_password') }}" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-foreground mb-2">
                        New Password
                    </label>
                    <input type="password" id="password" name="password" required placeholder="Enter new password"
                        class="input w-full">
                </div>
                
                <div>
                    <label for="confirm_password" class="block text-sm font-medium text-foreground mb-2">
                        Confirm New Password
                    </label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm new password"
                        class="input w-full">
                </div>

                <button type="submit" class="btn-primary w-full">
                    <i data-lucide="key" class="w-4 h-4 mr-2"></i>
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
